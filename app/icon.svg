<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fond beige -->
  <rect width="32" height="32" rx="8" fill="#C6A769"/>
  <!-- Bracelet haut -->
  <rect x="11" y="1" width="10" height="5" rx="2" fill="#A08040"/>
  <!-- Bracelet bas -->
  <rect x="11" y="26" width="10" height="5" rx="2" fill="#A08040"/>
  <!-- Boîtier -->
  <circle cx="16" cy="16" r="10" fill="#A08040"/>
  <!-- Cadran -->
  <circle cx="16" cy="16" r="8" fill="#FDF6E3"/>
  <!-- Aiguille minute -->
  <line x1="16" y1="16" x2="16" y2="10" stroke="#1A1A1A" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Aiguille heure -->
  <line x1="16" y1="16" x2="20" y2="18" stroke="#1A1A1A" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Centre -->
  <circle cx="16" cy="16" r="1.5" fill="#C6A769"/>
</svg>
